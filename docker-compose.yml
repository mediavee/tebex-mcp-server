services:
  tebex-mcp:
    build: .
    container_name: tebex-mcp
    restart: unless-stopped
    env_file: .env
    ports:
      # Bind to a private interface by default (e.g. Tailscale or loopback).
      # Replace 100.x.x.x with your Tailscale IP, or use 127.0.0.1 to expose
      # only locally and put a reverse proxy in front.
      - "${HTTP_BIND:-0.0.0.0}:${HTTP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:3000/healthz', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

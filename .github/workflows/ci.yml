name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.20"
      - name: Verify lockfile is up to date
        run: uv lock --check
      - name: Sync (frozen)
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check src
      - name: Ruff format check
        run: uv run ruff format --check src
      - name: Mypy
        run: uv run mypy src

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
